<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier | Modern Composition</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    
    <style>
        :root {
            --m-red: #ff0000; --m-blue: #0000ff; --m-yellow: #ffff00;
            --m-black: #000000; --m-white: #ffffff;
            --m-border: 12px;
            --sidebar-width: 320px;
        }

        body { 
            background-color: #080808; 
            color: #efefef;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        /* Sidebar Navigation */
        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid #222;
            padding: 2rem;
            z-index: 1000;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 40px;
            min-height: 100vh;
        }

        /* The Art Grid */
        #collage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            grid-auto-rows: 180px;
            grid-auto-flow: dense;
            gap: var(--m-border);
            background: var(--m-black);
            padding: var(--m-border);
            border: 2px solid #222;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Tile Styles */
        .grid-item-wrapper {
            position: relative;
            background: var(--m-white);
            overflow: hidden;
            display: flex;
            align-items: center; justify-content: center;
            cursor: crosshair;
            transition: transform 0.2s ease;
        }

        .grid-item-wrapper:hover { transform: scale(0.98); }
        .grid-item { width: 100%; height: 100%; object-fit: cover; }
        .grid-text { color: black; font-weight: 900; text-transform: uppercase; text-align: center; font-size: 1.2rem; }

        /* Mondrian Colors */
        .block-red { background: var(--m-red) !important; }
        .block-blue { background: var(--m-blue) !important; }
        .block-yellow { background: var(--m-yellow) !important; }

        .span-wide { grid-column: span 2; }
        .span-tall { grid-row: span 2; }
        .span-large { grid-column: span 2; grid-row: span 2; }

        /* Modern UI Components */
        .nav-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-bottom: 1rem; display: block; }
        .btn-modern {
            width: 100%;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            font-weight: 600;
            text-align: left;
            transition: all 0.2s;
            border: 1px solid #333;
            background: #151515;
            color: white;
        }
        .btn-modern:hover { background: #222; border-color: #444; }
        .btn-primary-m { background: white; color: black; border: none; }
        .btn-primary-m:hover { background: #ddd; }

        .btn-remove {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.8); color: white; border: none;
            width: 28px; height: 28px; border-radius: 50%;
            display: none; z-index: 10;
        }
        .grid-item-wrapper:hover .btn-remove { display: flex; align-items: center; justify-content: center; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 class="fw-900 mb-5" style="letter-spacing: -1px;">ATELIER<span class="text-danger">.</span></h2>
    
    <span class="nav-label">Composition</span>
    <button class="btn-modern btn-primary-m" data-bs-toggle="modal" data-bs-target="#importModal">
        <i class="bi bi-file-earmark-arrow-up me-2"></i> Import .txt
    </button>
    <button class="btn-modern" onclick="addManualBlock()">
        <i class="bi bi-plus-square me-2"></i> Add Color Block
    </button>
    
    <div class="my-4 border-bottom border-secondary opacity-25"></div>

    <span class="nav-label">Canvas Tools</span>
    <button class="btn-modern" onclick="shuffleGrid()">
        <i class="bi bi-shuffle me-2"></i> Shuffle Layout
    </button>
    <button class="btn-modern text-danger" onclick="clearCanvas()">
        <i class="bi bi-trash3 me-2"></i> Clear Canvas
    </button>
    
    <div class="mt-auto pt-5">
        <button class="btn-modern bg-danger border-0 py-3 text-center w-100" onclick="exportCanvas()">
            EXPORT COMPOSITION
        </button>
    </div>
</div>

<div class="main-content">
    <div id="collage-grid"></div>
</div>

<div class="modal fade" id="importModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-white border-secondary">
            <div class="modal-body p-4">
                <h5 class="mb-3">Batch Import</h5>
                <input type="file" id="file-input" accept=".txt" class="form-control bg-black text-white border-secondary mb-3">
                <div class="d-flex gap-2">
                    <button class="btn btn-light w-100" onclick="handleFile()">Generate</button>
                    <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const grid = document.getElementById('collage-grid');
    const colors = ['block-red', 'block-blue', 'block-yellow'];
    const spans = ['', 'span-wide', 'span-tall', 'span-large'];
    const PROXY = "https://cors-anywhere.herokuapp.com/";

    function createTile(content, isUrl) {
        const wrapper = document.createElement('div');
        const colorClass = isUrl ? '' : colors[Math.floor(Math.random() * colors.length)];
        wrapper.className = `grid-item-wrapper ${colorClass}`;

        if (isUrl) {
            const img = document.createElement('img');
            img.className = 'grid-item';
            img.crossOrigin = "anonymous";
            img.src = PROXY + content; 
            img.onerror = () => { img.src = content; };
            wrapper.appendChild(img);
        } else if (content) {
            const p = document.createElement('p');
            p.className = 'grid-text';
            p.innerText = content;
            wrapper.appendChild(p);
        }

        wrapper.onclick = (e) => {
            if(e.target.tagName === 'BUTTON') return;
            let current = spans.find(s => s && wrapper.classList.contains(s)) || '';
            let nextIdx = (spans.indexOf(current) + 1) % spans.length;
            spans.forEach(s => s && wrapper.classList.remove(s));
            if (spans[nextIdx]) wrapper.classList.add(spans[nextIdx]);
            save();
        };

        const del = document.createElement('button');
        del.className = 'btn-remove'; del.innerHTML = '<i class="bi bi-x"></i>';
        del.onclick = (e) => { e.stopPropagation(); wrapper.remove(); save(); };
        wrapper.appendChild(del);

        return wrapper;
    }

    function addManualBlock() {
        grid.appendChild(createTile(null, false));
        save();
    }

    function clearCanvas() {
        if(confirm("This will permanently delete your current composition. Continue?")) {
            grid.innerHTML = '';
            localStorage.removeItem('atelier_modern_v6');
        }
    }

    function handleFile() {
        const file = document.getElementById('file-input').files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.split('\n').map(l => l.trim()).filter(l => l);
            lines.forEach(line => {
                const isUrl = line.startsWith('http');
                grid.appendChild(createTile(line, isUrl));
                if (Math.random() > 0.4) grid.appendChild(createTile(null, false));
            });
            save();
            bootstrap.Modal.getInstance(document.getElementById('importModal')).hide();
        };
        reader.readAsText(file);
    }

    function shuffleGrid() {
        const items = Array.from(grid.children);
        for (let i = items.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            grid.appendChild(items[j]);
        }
        save();
    }

    function save() {
        const items = Array.from(grid.querySelectorAll('.grid-item-wrapper')).map(w => ({
            content: w.querySelector('img')?.src || w.querySelector('.grid-text')?.innerText || null,
            isUrl: !!w.querySelector('img'),
            span: Array.from(w.classList).find(c => c.startsWith('span-')) || '',
            color: Array.from(w.classList).find(c => c.startsWith('block-')) || ''
        }));
        localStorage.setItem('atelier_modern_v6', JSON.stringify(items));
    }

    function exportCanvas() {
        html2canvas(grid, { useCORS: true, backgroundColor: '#000', scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `composition-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    const saved = JSON.parse(localStorage.getItem('atelier_modern_v6') || '[]');
    saved.forEach(s => {
        const tile = createTile(s.content, s.isUrl);
        if (s.span) tile.classList.add(s.span);
        if (s.color) tile.classList.add(s.color);
        grid.appendChild(tile);
    });

    new Sortable(grid, { animation: 200, onEnd: save });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
