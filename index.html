<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier | Home & Creator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    
    <style>
        :root {
            --m-red: #ff0000; --m-blue: #0000ff; --m-yellow: #ffff00;
            --m-black: #000000; --m-white: #ffffff;
            --m-border: 12px;
        }

        body { 
            background-color: #0a0a0a; 
            color: var(--m-white);
            font-family: 'Inter', sans-serif;
        }

        /* --- PRETTY HERO SECTION --- */
        .hero-split {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 100px 5%;
            background: linear-gradient(135deg, #111 0%, #0a0a0a 100%);
            border-bottom: 12px solid var(--m-black);
            min-height: 60vh;
        }

        .hero-text { max-width: 500px; }
        
        .hero-title {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: -3px;
            text-transform: uppercase;
            line-height: 0.9;
            margin-bottom: 20px;
        }

        /* The Mondrian Art-Button */
        .btn-mondrian {
            position: relative;
            display: inline-block;
            padding: 1.2rem 3rem;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: white;
            text-decoration: none;
            border: 3px solid white;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            overflow: hidden;
            z-index: 1;
        }

        .btn-mondrian::before, .btn-mondrian::after {
            content: "";
            position: absolute; top: 0; height: 100%; width: 0; z-index: -1;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .btn-mondrian::before { left: 0; background: var(--m-red); }
        .btn-mondrian::after { right: 0; background: var(--m-blue); }

        .btn-mondrian:hover {
            color: white;
            border-color: var(--m-yellow);
            transform: translateY(-5px);
            box-shadow: 8px 8px 0px var(--m-black);
        }
        .btn-mondrian:hover::before, .btn-mondrian:hover::after { width: 50%; }

        /* --- COLLAGE CREATOR SECTION --- */
        .creator-container { padding: 80px 0; }

        #collage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            grid-auto-rows: 160px;
            grid-auto-flow: dense;
            gap: 12px;
            background: var(--m-black);
            padding: 12px;
            border: var(--m-border) solid var(--m-black);
        }

        .grid-item-wrapper {
            position: relative;
            background: var(--m-white);
            display: flex; align-items: center; justify-content: center;
            cursor: grab;
            overflow: hidden;
        }

        .grid-item { width: 100%; height: 100%; object-fit: cover; }
        .grid-text { color: black; font-weight: 900; text-transform: uppercase; padding: 10px; }

        .block-red { background: var(--m-red) !important; }
        .block-blue { background: var(--m-blue) !important; }
        .block-yellow { background: var(--m-yellow) !important; }

        .span-wide { grid-column: span 2; }
        .span-tall { grid-row: span 2; }
        
        .btn-atelier { border-radius: 0; font-weight: 700; text-transform: uppercase; border: 2px solid white; }
    </style>
</head>
<body>

<header class="hero-split">
    <div class="hero-text">
        <h1 class="hero-title">ATELIER<span style="color:var(--m-red)">.</span></h1>
        <p class="text-secondary mb-4">Create, organize, and export geometric compositions in the style of De Stijl.</p>
        <a href="mondrian.html" class="btn-mondrian">Launch Full App</a>
    </div>
    <div class="d-none d-lg-block">
        <div style="width: 300px; height: 300px; border: 10px solid white; position: relative;">
            <div style="position: absolute; top: -20px; left: -20px; width: 100px; height: 100px; background: var(--m-red);"></div>
            <div style="position: absolute; bottom: 40px; right: -30px; width: 150px; height: 60px; background: var(--m-blue);"></div>
        </div>
    </div>
</header>

<div class="container creator-container">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <h3 class="mb-4 text-uppercase fw-bold">Quick Creator</h3>
            <div class="input-group mb-5 shadow-sm">
                <input type="text" class="form-control form-control-lg border-0 bg-dark text-white p-4" id="smart-input" placeholder="Paste a link or write something...">
                <button class="btn btn-primary px-5 fw-bold border-0" style="background: var(--m-blue);" onclick="handleSingleInput()">ADD</button>
            </div>

            <div id="collage-grid"></div>
            
            <div class="mt-4 d-flex justify-content-between align-items-center">
                <button class="btn btn-atelier btn-outline-light" onclick="shuffleGrid()">Shuffle</button>
                <div>
                    <a href="#" class="text-danger text-decoration-none me-4 fw-bold" onclick="clearGrid()">Clear</a>
                    <button class="btn btn-atelier btn-danger" onclick="exportImage()">Export PNG</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const grid = document.getElementById('collage-grid');
    const colors = ['block-red', 'block-blue', 'block-yellow'];

    // Reuse your existing logic for handling inputs and creating tiles
    function createTile(content, isUrl) {
        const wrapper = document.createElement('div');
        const colorClass = isUrl ? '' : colors[Math.floor(Math.random() * colors.length)];
        wrapper.className = `grid-item-wrapper ${colorClass}`;

        if (isUrl) {
            const img = document.createElement('img');
            img.className = 'grid-item';
            img.src = content; 
            wrapper.appendChild(img);
        } else if (content) {
            const p = document.createElement('p');
            p.className = 'grid-text';
            p.innerText = content;
            wrapper.appendChild(p);
        }

        wrapper.onclick = () => {
            wrapper.classList.toggle('span-wide');
            save();
        };

        return wrapper;
    }

    function handleSingleInput() {
        const input = document.getElementById('smart-input');
        const val = input.value.trim();
        if (!val) return;
        grid.appendChild(createTile(val, val.startsWith('http')));
        input.value = '';
        save();
    }

    function shuffleGrid() {
        const items = Array.from(grid.children);
        for (let i = items.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            grid.appendChild(items[j]);
        }
        save();
    }

    function save() {
        localStorage.setItem('quick_collage', grid.innerHTML);
    }

    function clearGrid() { if(confirm("Clear?")) { grid.innerHTML = ''; save(); }}

    function exportImage() {
        html2canvas(grid).then(canvas => {
            const a = document.createElement('a');
            a.download = 'collage.png';
            a.href = canvas.toDataURL();
            a.click();
        });
    }

    // Load saved
    grid.innerHTML = localStorage.getItem('quick_collage') || '';
    new Sortable(grid, { animation: 150, onEnd: save });
</script>

</body>
</html>
