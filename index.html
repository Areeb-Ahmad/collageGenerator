<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondrian Studio | Stable Edition</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    
    <style>
        :root {
            --m-red: #ff0000; --m-blue: #0000ff; --m-yellow: #ffff00;
            --m-black: #000000; --m-white: #ffffff;
        }

        body { 
            background: #111; color: white; 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0; overflow-x: hidden;
        }

        .navbar { background: #000; border-bottom: 2px solid var(--m-black); padding: 1.2rem 0; }

        #collage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            grid-auto-rows: 160px;
            grid-auto-flow: dense;
            gap: 15px;
            background: var(--m-black);
            padding: 15px;
            border: 15px solid var(--m-black);
            min-height: 80vh;
        }

        .grid-item-wrapper {
            position: relative;
            background: var(--m-white);
            padding: 10px;
            overflow: hidden;
            display: flex;
            align-items: center; justify-content: center;
            text-align: center;
            transition: opacity 0.3s;
        }

        .is-loading { background: #eee; border: 2px solid #ddd; }

        .grid-item { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease-in;
        }
        
        .grid-text { 
            color: var(--m-black); font-weight: 900; text-transform: uppercase; 
            line-height: 1.1; margin: 0; width: 100%; padding: 15px;
        }

        .block-red { background: var(--m-red) !important; }
        .block-red .grid-text { color: var(--m-white); }
        .block-blue { background: var(--m-blue) !important; }
        .block-blue .grid-text { color: var(--m-white); }
        .block-yellow { background: var(--m-yellow) !important; }
        .block-white { background: var(--m-white) !important; }

        .span-wide { grid-column: span 2; }
        .span-tall { grid-row: span 2; }
        .span-large { grid-column: span 2; grid-row: span 2; }

        .btn-ui {
            background: transparent; border: 2px solid #444; color: #fff;
            font-size: 11px; font-weight: bold; letter-spacing: 2px; padding: 8px 16px;
            text-transform: uppercase;
        }

        .btn-remove {
            position: absolute; top: 5px; right: 5px; padding: 4px 8px;
            background: var(--m-black); color: white; border: none; font-size: 10px;
            display: none; z-index: 20;
        }
        .grid-item-wrapper:hover .btn-remove { display: block; }

        .m-modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            align-items: center; justify-content: center;
        }
        .m-modal-content { background: var(--m-white); color: #000; padding: 40px; border: 15px solid #000; }
    </style>
</head>
<body>

<nav class="navbar sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
        <span style="font-weight: 900; letter-spacing: 5px;">MONDRIAN</span>
        <div class="d-flex gap-2">
            <button class="btn-ui" onclick="shuffleGrid()">Shuffle</button>
            <button class="btn-ui" onclick="toggleModal(true)">Batch</button>
            <button class="btn-ui" style="border-color: var(--m-red);" onclick="clearGrid()">Clear</button>
            <button class="btn-ui" style="background: white; color: black;" onclick="exportImage()">PNG</button>
        </div>
    </div>
</nav>

<div id="collage-grid"></div>

<div id="upload-modal" class="m-modal">
    <div class="m-modal-content">
        <h2 class="fw-black mb-4">BATCH UPLOAD</h2>
        <input type="file" id="file-input" accept=".txt" class="form-control mb-3">
        <div class="d-flex gap-2">
            <button class="btn btn-dark rounded-0 w-100 fw-bold" onclick="processFile()">START LOAD</button>
            <button class="btn btn-outline-dark rounded-0" onclick="toggleModal(false)">CANCEL</button>
        </div>
    </div>
</div>

<script>
    const grid = document.getElementById('collage-grid');
    const colors = ['block-red', 'block-blue', 'block-yellow', 'block-white'];
    const spanCycle = ['', 'span-wide', 'span-tall', 'span-large'];

    function toggleModal(show) { document.getElementById('upload-modal').style.display = show ? 'flex' : 'none'; }

    // CRASH PROTECTION: Limit how many images download at once
    async function throttledFetch(tasks, limit = 5) {
        const results = [];
        const executing = [];
        for (const task of tasks) {
            const p = Promise.resolve().then(() => task());
            results.push(p);
            if (limit <= tasks.length) {
                const e = p.then(() => executing.splice(executing.indexOf(e), 1));
                executing.push(e);
                if (executing.length >= limit) await Promise.race(executing);
            }
        }
        return Promise.all(results);
    }

    async function nitroFetch(url) {
        try {
            const res = await fetch(url, { mode: 'cors' });
            if (!res.ok) return url;
            const blob = await res.blob();
            return URL.createObjectURL(blob);
        } catch (e) { return url; }
    }

    function processFile() {
        const file = document.getElementById('file-input').files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (e) => {
            const lines = e.target.result.split(/\n/).map(l => l.trim()).filter(l => l);
            toggleModal(false);

            const fragment = document.createDocumentFragment();
            const tasks = [];

            lines.forEach(line => {
                const isUrl = line.startsWith('http');
                const tile = createTileElement(isUrl ? 'loading' : null, '', isUrl ? null : colors[Math.floor(Math.random() * colors.length)], isUrl ? null : line);
                fragment.appendChild(tile);
                if (isUrl) {
                    tasks.push(async () => {
                        const blobUrl = await nitroFetch(line);
                        const img = tile.querySelector('img');
                        if (img) {
                            img.src = blobUrl;
                            tile.classList.remove('is-loading');
                        }
                    });
                }
            });

            grid.appendChild(fragment);
            // Process images in batches of 5 to prevent browser crash
            await throttledFetch(tasks, 5);
            save();
        };
        reader.readAsText(file);
    }

    function createTileElement(url, span, color, text) {
        const wrapper = document.createElement('div');
        wrapper.className = `grid-item-wrapper ${span} ${color || ''}`;
        
        if (url) {
            if (url === 'loading') wrapper.classList.add('is-loading');
            const img = document.createElement('img');
            img.className = 'grid-item';
            if (url !== 'loading') img.src = url;
            img.onload = () => {
                img.style.opacity = "1";
                const ratio = img.width / img.height;
                if (ratio > 1.2) wrapper.classList.add('span-wide');
                else if (ratio < 0.8) wrapper.classList.add('span-tall');
            };
            wrapper.appendChild(img);
        } else {
            const p = document.createElement('p');
            p.className = 'grid-text';
            p.innerText = text;
            p.style.fontSize = text.length > 20 ? '0.8rem' : '1.2rem';
            wrapper.appendChild(p);
        }

        wrapper.onclick = () => {
            let current = spanCycle.find(s => s && wrapper.classList.contains(s)) || '';
            let next = (spanCycle.indexOf(current) + 1) % spanCycle.length;
            spanCycle.forEach(s => s && wrapper.classList.remove(s));
            if (spanCycle[next]) wrapper.classList.add(spanCycle[next]);
            save();
        };

        const rm = document.createElement('button');
        rm.className = 'btn-remove'; rm.innerText = '✕';
        rm.onclick = (e) => { e.stopPropagation(); wrapper.remove(); save(); };
        wrapper.appendChild(rm);

        return wrapper;
    }

    function shuffleGrid() {
        const children = Array.from(grid.children);
        for (let i = children.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            grid.appendChild(children[j]);
        }
        save();
    }

    function save() {
        const data = Array.from(grid.querySelectorAll('.grid-item-wrapper')).map(w => ({
            url: w.querySelector('img')?.src || null,
            text: w.querySelector('.grid-text')?.innerText || null,
            span: Array.from(w.classList).find(c => c.startsWith('span-')) || '',
            color: Array.from(w.classList).find(c => c.startsWith('block-')) || ''
        }));
        localStorage.setItem('mondrian_stable', JSON.stringify(data));
    }

    function clearGrid() { if(confirm("Reset?")) { grid.innerHTML = ''; localStorage.removeItem('mondrian_stable'); }}

    function exportImage() {
        html2canvas(grid, { useCORS: true, backgroundColor: '#000' }).then(canvas => {
            const a = document.createElement('a');
            a.download = 'composition.png';
            a.href = canvas.toDataURL();
            a.click();
        });
    }

    const saved = JSON.parse(localStorage.getItem('mondrian_stable') || '[]');
    saved.forEach(s => grid.appendChild(createTileElement(s.url, s.span, s.color, s.text)));
    new Sortable(grid, { animation: 150, onEnd: save });
</script>
</body>
</html>
