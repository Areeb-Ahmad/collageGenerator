<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondrian Studio | Ratio + Crop</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    
    <style>
        :root {
            --m-red: #E61919; --m-blue: #0055AA; --m-yellow: #c9b458;
            --m-black: #111111; --m-white: #FFFFFF;
        }

        body { background: #000; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .navbar { background: #000; border-bottom: 1px solid #222; padding: 15px 0; }

        #collage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            grid-auto-rows: 140px;
            grid-auto-flow: dense;
            gap: 12px; 
            background: var(--m-black);
            padding: 12px;
            border: 12px solid var(--m-black);
            min-height: 80vh;
        }

        .grid-item-wrapper {
            position: relative;
            background: var(--m-white);
            overflow: hidden;
            display: flex;
            transition: all 0.3s ease;
        }

        .grid-item {
            width: 100%; height: 100%; 
            object-fit: cover; /* Toggles between cover and contain via JS if needed */
        }

        /* Mondrian Colors */
        .block-red { background: var(--m-red); }
        .block-blue { background: var(--m-blue); }
        .block-yellow { background: var(--m-yellow); }
        
        /* Ratio Spans */
        .span-wide { grid-column: span 2; }
        .span-tall { grid-row: span 2; }
        .span-large { grid-column: span 2; grid-row: span 2; }

        .btn-ui {
            background: transparent; border: 1px solid #444; color: #fff;
            font-size: 10px; letter-spacing: 2px; padding: 8px 16px;
            text-transform: uppercase; transition: 0.2s;
        }
        .btn-ui.active { background: white; color: black; border-color: white; }
        .btn-ui:hover:not(.active) { border-color: #888; }

        .btn-remove {
            position: absolute; top: 0; right: 0; padding: 5px 10px;
            background: var(--m-black); color: white; border: none; font-size: 10px;
            display: none; cursor: pointer; z-index: 10;
        }
        .grid-item-wrapper:hover .btn-remove { display: block; }
    </style>
</head>
<body>

<nav class="navbar sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-4">
            <span style="font-weight: 900; letter-spacing: 2px;">STUDIO</span>
            <div class="btn-group">
                <button class="btn-ui active" id="mode-natural" onclick="setMode('natural')">Natural Ratio</button>
                <button class="btn-ui" id="mode-crop" onclick="setMode('crop')">Strict Crop</button>
            </div>
        </div>
        <div class="d-flex gap-2">
            <button class="btn-ui" style="border-color: var(--m-red);" onclick="clearGrid()">Reset</button>
            <button class="btn-ui" style="background: white; color: black;" onclick="exportImage()">Export</button>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-md-8 mx-auto">
            <div class="input-group shadow-lg">
                <input type="text" class="form-control bg-dark border-0 text-white" id="search-query" placeholder="Image URL or Search Term...">
                <button class="btn btn-light px-4 fw-bold" onclick="handleAdd()">ADD ITEM</button>
            </div>
        </div>
    </div>
    <div id="capture-area"><div id="collage-grid"></div></div>
</div>

<script>
    const grid = document.getElementById('collage-grid');
    let currentMode = 'natural'; // 'natural' or 'crop'

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('mode-natural').classList.toggle('active', mode === 'natural');
        document.getElementById('mode-crop').classList.toggle('active', mode === 'crop');
    }

    async function handleAdd() {
        const query = document.getElementById('search-query').value.trim();
        if (!query) return;

        let url = query;
        if (!query.startsWith('http')) {
            try {
                const res = await fetch(`/api/fetch-image/?type=artist&name=${encodeURIComponent(query)}`);
                const data = await res.json();
                url = data.url;
            } catch (e) { alert("Fetch failed."); return; }
        }

        if (url) {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = url;
            img.onload = () => {
                const ratio = img.width / img.height;
                let span = '';

                if (currentMode === 'natural') {
                    if (ratio > 1.3) span = 'span-wide';
                    else if (ratio < 0.8) span = 'span-tall';
                } else {
                    // In strict crop, we randomly assign large squares for variety, but keep ratios 1:1
                    if (Math.random() > 0.7) span = 'span-large';
                }

                createTile(url, span);
                autoBalance();
                document.getElementById('search-query').value = '';
            };
        }
    }

    function createTile(url, spanClass, colorClass = null) {
        const wrapper = document.createElement('div');
        wrapper.className = `grid-item-wrapper ${spanClass || ''} ${colorClass || ''}`;
        
        if (url) {
            const imgEl = document.createElement('img');
            imgEl.src = url;
            imgEl.className = 'grid-item';
            wrapper.appendChild(imgEl);
        }

        const rm = document.createElement('button');
        rm.innerText = "REMOVE"; rm.className = "btn-remove";
        rm.onclick = () => { wrapper.remove(); save(); };
        
        wrapper.appendChild(rm);
        grid.appendChild(wrapper);
        save();
    }

    function autoBalance() {
        const colors = ['block-red', 'block-blue', 'block-yellow'];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        // Add a 1x1 color block to balance the photography
        createTile(null, '', randomColor);
    }

    function save() {
        const data = Array.from(grid.querySelectorAll('.grid-item-wrapper')).map(w => ({
            url: w.querySelector('img')?.src || null,
            span: Array.from(w.classList).find(c => c.startsWith('span-')) || '',
            color: Array.from(w.classList).find(c => c.startsWith('block-')) || ''
        }));
        localStorage.setItem('mondrian_final', JSON.stringify(data));
    }

    function clearGrid() {
        if(confirm("Reset canvas?")) {
            grid.innerHTML = '';
            localStorage.removeItem('mondrian_final');
        }
    }

    function exportImage() {
        const buttons = document.querySelectorAll('.btn-remove');
        buttons.forEach(b => b.style.display = 'none');
        html2canvas(grid, { useCORS: true, scale: 2, backgroundColor: '#111' }).then(canvas => {
            const a = document.createElement('a');
            a.download = `composition-${Date.now()}.png`;
            a.href = canvas.toDataURL();
            a.click();
            buttons.forEach(b => b.style.removeProperty('display'));
        });
    }

    // Initialize
    const saved = JSON.parse(localStorage.getItem('mondrian_final') || '[]');
    saved.forEach(s => createTile(s.url, s.span, s.color));
    new Sortable(grid, { animation: 200, onEnd: save });
</script>

</body>
</html>
